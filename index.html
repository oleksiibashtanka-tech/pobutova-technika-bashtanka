<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Побутова техніка Баштанка</title>

<style>
body{
margin:0;
background:#111;
font-family:Arial,sans-serif;
color:#fff;
}

header{
background:#000;
padding:20px;
text-align:center;
}

header h1{
margin:0;
font-size:32px;
}

header span{
color:#FFD400;
}

.hero{
padding:40px 20px;
text-align:center;
background:#1a1a1a;
}

.hero h2{
font-size:34px;
color:#FFD400;
}

.hero p{
font-size:18px;
}

.button{
display:inline-block;
margin-top:20px;
padding:15px 30px;
background:#FFD400;
color:#000;
text-decoration:none;
font-weight:bold;
border-radius:10px;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
padding:20px;
}

.card{
background:#222;
padding:20px;
border-radius:15px;
text-align:center;
}

.card img{
width:100%;
border-radius:10px;
}

.price{
font-size:24px;
color:#FFD400;
margin:10px 0;
}

.video{
display:block;
margin-top:10px;
background:#ff0050;
padding:12px;
color:white;
text-decoration:none;
border-radius:8px;
font-weight:bold;
}
</style>

</head>

<body>

<header>
<h1>Побутова <span>Техніка</span><br>Баштанка</h1>
</header>

<section class="hero">
<h2>Тільки нова техніка</h2>
<p>Найкращі ціни • Гарантія • Швидка доставка</p>

<a class="button" href="#">
Переглянути каталог
</a>
</section>

<section class="products">

<div class="card">
<img src="https://images.unsplash.com/photo-1584568694244-14fbdf83bd30?w=600" alt="">
<h3>Холодильник Samsung</h3>
<div class="price">24 999 ₴</div>

<a class="video" href="#">
🎥 Відеоогляд TikTok
</a>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1626806787461-102c1bfaaea1?w=600" alt="">
<h3>Пральна машина LG</h3>
<div class="price">18 499 ₴</div>

<a class="video" href="#">
🎥 Відеоогляд TikTok
</a>
</div>

</section>

</body>
</html>
