<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Побутова техніка Баштанка | Контакти</title>
    <style>
        :root {
            --bg-color: #0d0d0d;
            --card-bg: #1a1a1a;
            --accent-yellow: #f1c40f;
            --text-white: #ffffff;
            --text-gray: #aaaaaa;
            --border-radius: 12px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-white);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 20px 16px;
        }

        .container {
            width: 100%;
            max-width: 450px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* Шапка сайту */
        .header {
            background-color: var(--card-bg);
            border-radius: var(--border-radius);
            padding: 20px;
            text-align: center;
            border: 1px solid #2a2a2a;
        }

        .logo-title {
            color: var(--accent-yellow);
            font-size: 22px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            line-height: 1.2;
        }

        .logo-title span {
            color: var(--text-white);
        }

        .subtitle {
            margin-top: 10px;
            font-size: 15px;
            color: var(--text-gray);
            font-weight: 500;
        }

        .schedule {
            margin-top: 12px;
            font-size: 13px;
            color: var(--accent-yellow);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        /* Розділ "Як з нами зв'язатися" */
        .section-title {
            font-size: 18px;
            font-weight: 700;
            text-align: center;
            margin: 10px 0 4px 0;
            color: var(--text-white);
        }

        /* Кнопки-посилання */
        .links-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .link-item {
            background-color: var(--card-bg);
            border: 1px solid #2a2a2a;
            border-radius: var(--border-radius);
            padding: 14px 16px;
            display: flex;
            align-items: center;
            text-decoration: none;
            color: var(--text-white);
            transition: transform 0.1s ease, background-color 0.2s ease;
            position: relative;
        }

        .link-item:active {
            transform: scale(0.98);
            background-color: #222222;
        }

        .icon-wrapper {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 14px;
            flex-shrink: 0;
        }

        /* Кольори іконок */
        .viber-bg { background-color: #7351B1; }
        .telegram-bg { background-color: #229ED9; }
        .phone-bg { background-color: #4CD964; }
        .geo-bg { background-color: #FF3B30; }
        .tiktok-bg { background-color: #000000; border: 1px solid #333; }

        .icon-wrapper svg {
            width: 22px;
            height: 22px;
            fill: #ffffff;
        }

        .link-content {
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            padding-right: 20px;
        }

        .link-title {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 2px;
        }

        .link-subtitle {
            font-size: 13px;
            color: var(--text-gray);
        }

        /* Стрілочка праворуч (>) */
        .arrow-right {
            position: absolute;
            right: 18px;
            width: 8px;
            height: 14px;
            border-top: 2px solid #555555;
            border-right: 2px solid #555555;
            transform: rotate(45deg);
        }

        /* Акцентна кнопка TikTok (Нижня велика) */
        .tiktok-btn {
            background-color: var(--accent-yellow);
            border: none;
            color: #000000;
            padding: 16px;
            font-weight: 700;
        }

        .tiktok-btn .link-title {
            font-size: 18px;
        }

        .tiktok-btn .link-subtitle {
            color: #333333;
            font-weight: 500;
        }

        .tiktok-btn .icon-wrapper svg {
            fill: #000000;
        }

        .tiktok-btn .arrow-right {
            border-top: 2px solid #000000;
            border-right: 2px solid #000000;
        }

        /* Футер */
        .footer {
            text-align: center;
            font-size: 11px;
            color: #555555;
            margin-top: 10px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
    </style>
</head>
