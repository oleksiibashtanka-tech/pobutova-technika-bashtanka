<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Побутова техніка Баштанка</title>
    <style>
        :root {
            --bg-main: #0a0a0a;
            --card-bg: #111112;
            --card-border: #222224;
            --accent-yellow: #f5b900;
            --text-white: #ffffff;
            --text-gray: #8e8e93;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-main);
            background-image: linear-gradient(rgba(0, 0, 0, 0.85), rgba(0, 0, 0, 0.95)), url('data:image/svg+xml;utf8,<svg xmlns="http://w3.org" width="4" height="4" viewBox="0 0 4 4"><rect width="4" height="4" fill="none"/><circle cx="2" cy="2" r="0.5" fill="%23222"/></svg>');
            color: var(--text-white);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 24px 16px;
        }

        .container {
            width: 100%;
            max-width: 430px;
            display: flex;
            flex-direction: column;
        }

        /* Верхня панель (Контакти та час) */
        .top-info {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            background-color: rgba(17, 17, 18, 0.6);
            border: 1px solid var(--card-border);
            border-radius: 14px;
            padding: 16px;
            margin-bottom: 24px;
        }

        .brand-block .main-title {
            color: var(--accent-yellow);
            font-size: 15px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            line-height: 1.2;
        }

        .brand-block .main-title span {
            color: var(--text-white);
        }

        .top-right-contacts {
            text-align: right;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .top-phone {
            color: var(--text-white);
            font-size: 16px;
            font-weight: 700;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 6px;
        }

        .top-phone svg {
            fill: var(--accent-yellow);
        }

        .top-schedule {
            font-size: 11px;
            color: var(--text-gray);
            line-height: 1.3;
        }

        .top-schedule span {
            color: var(--accent-yellow);
            font-weight: 600;
        }

        /* Головний оффер */
        .main-offer {
            text-align: left;
            margin-bottom: 24px;
            padding: 0 4px;
        }

        .main-offer h1 {
            font-size: 26px;
            font-weight: 800;
            line-height: 1.2;
            color: var(--text-white);
        }

        .main-offer h1 span {
            color: var(--accent-yellow);
        }

        /* Сетка преимуществ (4 плашки) */
        .features-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-bottom: 32px;
        }

        .feature-card {
            background-color: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 12px 4px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: 8px;
        }

        .feature-icon-box {
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .feature-icon-box svg {
            width: 22px;
            height: 22px;
        }

        .feature-text {
            font-size: 10.5px;
            font-weight: 600;
            color: var(--text-white);
            line-height: 1.2;
        }

        /* Заголовок блоку зв'язку */
        .section-title {
            font-size: 18px;
            font-weight: 800;
            text-align: center;
            margin-bottom: 16px;
            color: var(--text-white);
            letter-spacing: 0.2px;
        }

        /* Список кнопок */
        .links-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .link-item {
            background-color: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 14px;
            padding: 16px;
            display: flex;
            align-items: center;
            text-decoration: none;
            color: var(--text-white);
            position: relative;
            box-shadow: inset 0 1px 0px rgba(255,255,255,0.03);
        }

        .link-item:active {
            background-color: #161617;
            border-color: #2c2c30;
        }

        .icon-wrapper {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 14px;
            flex-shrink: 0;
        }

        /* Точні кольори з оригінального зображення */
        .viber-bg { background-color: #593c97; }
        .telegram-bg { background-color: #1d94d2; }
        .phone-bg { background-color: #3cb84a; }
        .geo-bg { background-color: #e63428; }
        .tiktok-bg { background-color: #000000; }

        .icon-wrapper svg {
            width: 22px;
            height: 22px;
            fill: #ffffff;
        }

        .link-content {
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            padding-right: 20px;
        }

        .link-title {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 2px;
        }

        .link-subtitle {
            font-size: 13px;
            color: var(--text-gray);
            font-weight: 400;
        }

        /* Стрілка у стилі оригінального макету */
        .arrow-right {
            position: absolute;
            right: 18px;
            width: 8px;
            height: 8px;
            border-top: 2px solid #3a3a3c;
            border-right: 2px solid #3a3a3c;
            transform: rotate(45deg);
        }

        /* Нижня головна кнопка TikTok (Жовта) */
        .tiktok-btn {
            background-color: var(--accent-yellow);
            border: none;
            color: #000000;
            padding: 18px 16px;
            margin-top: 8px;
            box-shadow: 0 4px 20px rgba(245, 185, 0, 0.15);
        }

        .tiktok-btn:active {
            background-color: #dba500;
        }

        .tiktok-btn .link-title {
            color: #000000;
            font-size: 18px;
            font-weight: 800;
        }

        .tiktok-btn .link-subtitle {
            color: #000000;
            font-weight: 600;
            opacity: 0.9;
        }

        .tiktok-btn .icon-wrapper svg {
            fill: #000000;
        }

        .tiktok-btn .arrow-right {
            border-top: 2px solid #000000;
            border-right: 2px solid #000000;
            opacity: 0.6;
        }

        /* Копірайт та футер */
        .footer {
            text-align: center;
            font-size: 11px;
            color: #3a3a3c;
            margin-top: 32px;
            margin-bottom: 16px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="container">
        
        <!-- Верхня фірмова панель магазину -->
        <div class="top-info">
            <div class="brand-block">
                <div class="main-title">Побутова<br><span>Техніка Баштанка</span></div>
            </div>
            <div class="top-right-contacts">

        <div class="main-offer">
            <h1>Якісна техніка<br><span>для вашого дому</span></h1>
        </div>

        <div class="features-grid">

                </div>
                <div class="feature-text">Офіційна<br>гарантія</div>
            </div>
            <div class="feature-card">
                <div class="feature-icon-box">
